# キー認識の改善
set -g xterm-keys on

# 端末能力（tmux-256color を推奨。ない場合は xterm-256color に変更）
set -g default-terminal "tmux-256color"

# undercurl / underscore colors (tmux >= 3.0)
set -as terminal-overrides 'tmux-256color:Smulx=\E[4::%p1%dm'
set -as terminal-overrides 'tmux-256color:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# prefix を C-a に変更
unbind C-b
set -g prefix C-a
set-option -g repeat-time 0
set-option -g focus-events on


# マウス有効
set -g mouse on

# インデックス設定
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# vi モード（必要なら有効化）
setw -g mode-keys vi

# 分割キー
unbind '"'
unbind %
bind | split-window -h
bind _ split-window -v

# Windows / Sessions control
bind -n M-c new-window -c "${pane_current_path}"
bind -n M-n previous-window
bind -n M-p next-window
bind -n M-k switch-client -p
bind -n M-j switch-client -n

# リロード
bind-key -N "再読み込み" r \
  source-file ~/.config/tmux/tmux.conf \; \
 display-message "Reloaded!"

# そのペイン以外を kill（確認付き、安全）
bind e confirm-before -p "Kill all other panes? (y/n)" "kill-pane -a"

# クリップボード連携（環境により効かない場合あり）
set -s set-clipboard on

set-option -g status-justify "left"
#set-option utf8-default on
#set-option -g mouse-select-pane
set-window-option -g mode-keys vi
#set-window-option -g utf8 on
# look'n feel
# set-option -g l-fg cyan
set-option -g status-bg black
set -g pane-active-border-style fg=colour166,bg=default
set -g window-style fg=colour10,bg=default
set -g window-active-style fg=colour12,bg=default
set-option -g history-limit 64096

set -sg escape-time 10

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

# import
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

source ~/.config/tmux/theme.conf
source ~/.config/tmux/statusline.conf
source ~/.config/tmux/utility.conf

# タイトル
set -g set-titles on
set -g set-titles-string "#T"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'

# TPM
setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"
if-shell 'test ! -d "$HOME/.config/tmux/plugins/tpm"' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm \"$HOME/.config/tmux/plugins/tpm\" && \"$HOME/.config/tmux/plugins/tpm/bin/install_plugins\""'
run-shell "$HOME/.config/tmux/plugins/tpm/tpm"
